<!DOCTYPE html>
<!-- ==========================================================
     CONNECTION FIX - what changed in this pass (folder
     structure was NOT changed; only the references below)
     ==========================================================

     Every <script src="../js/application/...js"> tag on this
     page pointed one folder too deep: Config.js, StorageService.js, DataService.js and login.js actually live
     directly under www4/addedFiles/js/, not under an
     "application" sub-folder - so those tags 404'd and none of
     that code ever ran. Fixed by pointing each tag at
     ../js/...js instead, without moving a single file.

     Also added <script src="../js/DataService.js">, which did
     not exist anywhere in the project - see DataService.js for
     details.
     ========================================================== -->
<html lang="en">

<head>
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#123b8d">

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Management System - Login</title>

    <link rel="stylesheet" href="login.css">

    <link rel="stylesheet" href="common.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- ===========================
         Login Container
    ============================ -->

    <div class="container">

        <div class="login-card">

            <!-- Logo -->

            <img
                src="logo.png"
                alt="Student Management System Logo"
                class="logo">

            <!-- Login Title -->

            <h2 class="title" id="loginTitle">

                Login

            </h2>

            <p class="subtitle" id="loginSubtitle">

                Welcome to Student Management System

            </p>

            <!-- Username -->

            <div class="input-box">

                <i class="fa-regular fa-user"></i>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter Username"
                    autocomplete="username">

            </div>

            <!-- Password -->

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                    autocomplete="current-password">

                <i
                    class="fa-regular fa-eye"
                    id="togglePassword"></i>

            </div>

            <!-- Remember Me -->

            <div class="options">

                <label>

                    <input
                        type="checkbox"
                        id="rememberMe">

                    Remember Me

                </label>

                <a href="#">

                    Forgot Password?

                </a>

            </div>

            <!-- Login Button -->

            <button
                type="button"
                id="loginBtn">

                Login

            </button>

            <!-- Sign Up Button -->

            <button
                type="button"
                class="signup"
                id="signupBtn">

                Sign Up

            </button>

        </div>

    </div>

    <!-- JavaScript -->
    <!-- Common dependencies load first so login.js can use Session.login() / Session.logout() -->

    <script src="Config.js"></script>

    <script src="StorageService.js"></script>

    <script src="DataService.js"></script>

    <script src="common.js"></script>

   <script src="theme.js"></script>

    <script src="navigation.js"></script>

    <script src="session.js"></script>

    <script src="register-sw.js"></script>
    
    <script src="LegacyCompatShim.js"></script>

    <script src="login.js"></script>

</body>

</html>
